<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/webp" href="favicon.png">
  <title>manukeft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
    }
    .manny-img {
      width: 160px;
      margin-bottom: 20px;
    }
    .title {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #000;
      line-height: 1;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 28px;
    }
    .links a {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #000;
      text-decoration: none;
      border-bottom: 1.5px solid #000;
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .links a:hover {
      color: #888;
      border-color: #888;
    }
  </style>
</head>
<body>
  <img class="manny-img" src="manny.png" alt="Manny a la obra" />
  <div class="title">Sitio en<br>construcción</div>
  <div class="links">
    <a href="https://instagram.com/manukeft" target="_blank">Instagram</a>
    <a href="https://youtube.com/@manukeft" target="_blank">YouTube</a>
  </div>
</body>
</html>
